apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sniffer-api
  namespace: sniffer
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: sniffer.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sniffer-api
                port:
                  number: 80
