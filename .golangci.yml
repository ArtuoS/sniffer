version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - errcheck
    - goconst
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nilerr
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused

linters-settings:
  govet:
    enable-all: true
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
  misspell:
    locale: US
  goconst:
    min-len: 3
    min-occurrences: 3

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - goconst
        - unparam
