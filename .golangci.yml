version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - goconst
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nilerr
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused

  settings:
    govet:
      enable-all: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    misspell:
      locale: US
    goconst:
      min-len: 3
      min-occurrences: 3

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst
          - unparam
